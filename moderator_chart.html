.sb-btn{

}

/* ── Chart ── */
#chart{width:100%;max-width:900px;height:480px}

/* ── Caption ── */
.caption{max-width:900px;font-size:0.78rem;line-height:1.6;color:#2e4b62;margin-top:0.8rem;border-top:1px dashed #e69c67;padding-top:0.7rem}
.caption strong{font-weight:500;color:#27304a}

const X = [0,1,2,3,4];
const X_LABELS = ['None','<1 hr','1–3 hrs','4–6 hrs','7+ hrs'];
const PALETTE = {
  porcelain:'#fefdf9', chiffon:'#faf5cc', silk:'#ebc8bb',
  almond:'#e69c67', indigo:'#27304a', blue:'#2e4b62'
};

function hexRgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function buildTraces(modKey){
  const mod = MODS[modKey];
  const traces = [];
  for(const grp of mod.groups){
    for(const pk of ['p1','p2']){
      const col = pk==='p1'?1:2;
      const upper = grp[pk+'_upper'];
      const lower = grp[pk+'_lower'];
      traces.push({
        x:[...X,...X.slice().reverse()],
        y:[...upper,...lower.slice().reverse()],
        fill:'toself',fillcolor:hexRgba(grp.colour,0.15),
        line:{color:'rgba(0,0,0,0)'},hoverinfo:'skip',
        showlegend:false,xaxis:`x${col===1?'':'2'}`,yaxis:`y${col===1?'':'2'}`
      });
      traces.push({
        x:X,y:grp[pk],
        mode:'lines+markers',
        name:grp.name,
        line:{color:grp.colour,width:2.5},
        marker:{size:5,color:grp.colour},
        showlegend:pk==='p1',
        legendgroup:grp.name,
        xaxis:`x${col===1?'':'2'}`,yaxis:`y${col===1?'':'2'}`
      });
    }
  }
  return traces;
}

function updateCaption(key){
  const cap = CAPTIONS[key];
  const p1=cap.p1, p2=cap.p2;
  document.getElementById('caption').innerHTML =
    `<strong>Moderator:</strong> ${key}. ${cap.levels}<br>`+

    `<span class="cap-stat">b = ${p1.b_int>=0?'+':''}${p1.b_int.toFixed(3)}</span>`+

    `<em>Confidence bands: ±1.96 × SE(b&#7522;&#7511;&#7511;) × SM hours × moderator value. Source: Understanding Society (UKHLS), waves 2010–2019.</em>`;
}
