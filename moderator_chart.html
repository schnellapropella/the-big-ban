body{

  padding:1.8rem 0.8rem 1rem;
}
h2{

  font-size:1.35rem;
  font-weight:600;
  color:#2e4b62;
  margin-bottom:0.35rem;
}
.intro{
  font-size:0.9rem;
  line-height:1.7;
  color:rgba(39,48,74,0.72);
  margin-bottom:1.6rem;
  max-width:760px;
}

/* ── Scrapbook buttons ── */
.btn-row{
  display:flex;
  gap:18px;
  flex-wrap:wrap;
  margin-bottom:1.6rem;
  align-items:center;
  justify-content:center;
}
.sb-btn{
  font-family:'Caveat',cursive;
  font-size:1.1rem;
  font-weight:700;
  line-height:1.2;
  text-align:center;
  cursor:pointer;
  border:none;
  outline:none;
  padding:0;
  width:110px;
  height:90px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:transform 0.15s ease, filter 0.15s ease;
  word-break:break-word;
  position:relative;
  background:none;
}
.sb-btn:hover{
  transform:scale(1.08) rotate(-1.5deg);
  filter:brightness(1.08);
}
.sb-btn.active::after{
  content:'';
  position:absolute;
  inset:-4px;
  border:2.5px dashed #27304a;
  border-radius:inherit;
  pointer-events:none;
}
/* Shape: blob for Sex */
.btn-sex .shape{
  position:absolute;inset:0;
  background:#e69c67;
  border-radius:62% 38% 55% 45% / 52% 48% 60% 40%;
}
.btn-sex.active::after{border-radius:62% 38% 55% 45% / 52% 48% 60% 40%;}
/* Shape: cloud for Self-esteem — green so it reads on yellow bg */
.btn-se .shape{
  position:absolute;inset:0;
  background:#97c58a;
  border-radius:50% 50% 40% 60% / 60% 40% 60% 40%;
}
.btn-se.active::after{border-radius:50% 50% 40% 60% / 60% 40% 60% 40%;}
/* Shape: petal for Health */
.btn-health .shape{
  position:absolute;inset:0;
  background:#ebc8bb;
  border-radius:40% 60% 60% 40% / 40% 40% 60% 60%;
}
.btn-health.active::after{border-radius:40% 60% 60% 40% / 40% 40% 60% 60%;}

.sb-btn span.label{
  position:relative;
  z-index:1;
  color:#27304a;
  padding:4px 6px;
}

/* ── Scrapbook paper frame ── */
.paper-outer{
  transform: rotate(-0.6deg);
  margin: 28px 8px 32px;
  position: relative;
  filter: drop-shadow(4px 6px 12px rgba(0,0,0,0.22));

</div>

<div class="chart-area">

</div>

  "Sex": {
    "Male":   { subj:'A boy',   poss:'his' },

const COHORT_LABEL = { p1:'born around 2000', p2:'born around 2005' };

function makeHoverText(modKey, grp, pk){
  const prose = GROUP_PROSE[modKey][grp.name];
  const baseline = grp[pk][0];
  return grp[pk].map((val, i) => {
    const diff = val - baseline;
    const pct  = Math.abs((diff / baseline) * 100).toFixed(1);
    const dir  = diff < 0 ? `↓ ${pct}% lower than no use` : i === 0 ? 'baseline' : `↑ ${pct}% higher than no use`;
    const usageLine = i === 0 ? 'None' : X_LABELS_HOVER[i].replace(' of','');
    return `${prose.subj}<br>Cohort: ${COHORT_LABEL[pk]}<br>SM use: ${usageLine}<br>Happiness: ${val.toFixed(2)} / 7<br>Change: ${dir}`;
  });
}

function buildTraces(modKey){
  const mod=MODS[modKey];
  const traces=[];
  for(const grp of mod.groups){
    for(const pk of ['p1','p2']){
      const ax=pk==='p1'?'':'2';
      traces.push({
        x:X,y:grp[pk],
        mode:'lines+markers',
        name:grp.name,
        line:{color:grp.colour,width:2.5},
        marker:{size:6,color:grp.colour},
        showlegend:pk==='p1',
        legendgroup:grp.name,
        xaxis:'x'+ax,yaxis:'y'+ax,
        hoverinfo:'text',
        hovertext:makeHoverText(modKey,grp,pk),
        hoverlabel:{
          bgcolor:'#27304a',
          bordercolor:'#27304a',
          font:{family:'DM Sans, sans-serif',size:12,color:'#fefdf9'},
          padding:{t:10,b:10,l:14,r:14},
          borderwidth:0,
          borderpad:12,
          align:'left'
        }
      });
    }
  }
  return traces;
}

function roundTooltips(){
  document.querySelectorAll('.hovertext rect').forEach(r=>{
    r.setAttribute('rx','8');
    r.setAttribute('ry','8');
  });
}

function selectMod(key){
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+key).classList.add('active');
  Plotly.react('chart',buildTraces(key),layout,config);
  updateCaption(key);
  document.getElementById('chart').on('plotly_hover', roundTooltips);
}

function reportHeight() {
  const height = document.documentElement.scrollHeight;
  window.parent.postMessage({ iframeHeight: height }, '*');
}

// Watch for size changes (important for Plotly updates)
const resizeObserver = new ResizeObserver(reportHeight);
resizeObserver.observe(document.body);

// Trigger at key moments
window.addEventListener('load', reportHeight);
window.addEventListener('resize', reportHeight);

// Ensure correct height after Plotly renders / updates
setTimeout(reportHeight, 100);
setTimeout(reportHeight, 500);

// ALSO trigger after Plotly updates (this is the key upgrade)
