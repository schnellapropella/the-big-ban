.tape-left{
  position:absolute;top:-14px;left:44px;

  background-image:repeating-linear-gradient(90deg,rgba(255,255,255,0.1) 0px,rgba(255,255,255,0.1) 1px,transparent 1px,transparent 5px);

  position:absolute;top:-11px;right:80px;

}
.chart-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:0;
  width:100%;
  transform:rotate(0.6deg);
  transform-origin:center center;
}
.chart-col{width:100%;}
#chartHap,#chartSM{width:100%;height:400px;}
.caption{
  font-size:0.76rem;line-height:1.7;color:#2e4b62;
  margin-top:0.8rem;
  border-top:1px solid rgba(230,156,103,0.4);
  padding-top:0.8rem;
  transform:rotate(0.6deg);
  transform-origin:center center;
}
.caption em{color:#2e4b62;}
</style>

<body>
<div class="paper-outer">
  <div class="tape-left"></div>
  <div class="tape-right"></div>
  <div class="paper">
    <div class="chart-row">
      <div class="chart-col"><div id="chartHap"></div></div>
      <div class="chart-col"><div id="chartSM"></div></div>
    </div>
    <div class="caption" id="caption">
      As children grow older, happiness declines and social media use rises — both trends sharper among those born in 2005.
      <br><em>Source: Understanding Society (UKHLS), waves 2010–2019. Mean values shown for ages 10–15.</em>
    </div>
  </div>
</div>

<script>
const AGES = [10,11,12,13,14,15];

// Mean happiness by age — calculated from raw data
const HAP_P1 = [5.991,5.998,5.889,5.734,5.555,5.652];
const HAP_P2 = [5.978,6.011,5.837,5.612,5.482,5.336];

// Mean social media use (0–4 ordinal) by age
const SM_P1 = [1.206,1.358,1.319,1.494,1.642,1.739];
const SM_P2 = [1.328,1.310,1.513,1.727,1.913,1.940];

const COL_P1 = '#2e4b62'; // Charcoal Blue — Born in 2000
const COL_P2 = '#e69c67'; // Toasted Almond — Born in 2005

const hoverBase = {
  bgcolor:'#27304a',bordercolor:'#27304a',
  font:{family:'DM Sans, sans-serif',size:12,color:'#fefdf9'},
  align:'left'
};

function makeTrace(x, y, name, colour, showlegend, xaxis, yaxis){
  return {
    x, y,
    mode:'lines+markers',
    name,
    line:{color:colour, width:2},
    marker:{size:7, color:colour, symbol:'circle'},
    showlegend,
    xaxis, yaxis,
    hoverlabel: hoverBase,
    hovertemplate: `Age %{x}<br>${name}<br>%{customdata}<extra></extra>`,
  };
}

// Happiness chart
const hapAxisBase = {
  tickvals:AGES,
  tickfont:{family:'DM Sans,sans-serif',size:11,color:'#27304a'},
  gridcolor:'rgba(0,0,0,0.08)',
  linecolor:'rgba(0,0,0,0.15)',
  showline:true,
};
const hapLayout = {
  annotations:[{
    text:'Happiness',
    xref:'paper',yref:'paper',x:0.5,y:1.05,
    showarrow:false,
    font:{family:'DM Sans,sans-serif',size:15,color:'#27304a',weight:600},
    xanchor:'center'
  }],
  xaxis:{...hapAxisBase, title:{text:'Age',font:{family:'DM Sans,sans-serif',size:12,color:'#27304a'}}},
  yaxis:{
    range:[0.5,7.5],
    tickvals:[1,2,3,4,5,6,7],
    ticktext:['1 — Not at all happy','2','3','4','5','6','7 — Completely happy'],
    title:{text:'Self-reported happiness',font:{family:'DM Sans,sans-serif',size:12,color:'#27304a'},standoff:8},
    gridcolor:'rgba(0,0,0,0.08)',
    linecolor:'rgba(0,0,0,0.15)',
    showline:true,
    tickfont:{family:'DM Sans,sans-serif',size:10,color:'#27304a'},
  },
  legend:{
    orientation:'h',x:0.5,y:-0.22,xanchor:'center',
    font:{family:'DM Sans,sans-serif',size:12,color:'#27304a'},
    bgcolor:'rgba(0,0,0,0)',borderwidth:0,
    title:{text:'Cohort  ',font:{family:'DM Sans,sans-serif',size:12,color:'#27304a'}}
  },
  paper_bgcolor:'rgba(0,0,0,0)',
  plot_bgcolor:'rgba(247,244,238,0.0)',
  margin:{t:40,b:70,l:85,r:10},
  font:{family:'DM Sans,sans-serif',color:'#27304a'},
};

// Social media chart
const smTicktext = ['None','<1 hour','1–3 hours','4–6 hours','7+ hours'];
const smLayout = {
  annotations:[{
    text:'Social media use',
    xref:'paper',yref:'paper',x:0.5,y:1.05,
    showarrow:false,
    font:{family:'DM Sans,sans-serif',size:15,color:'#27304a',weight:600},
    xanchor:'center'
  }],
  xaxis:{...hapAxisBase, title:{text:'Age',font:{family:'DM Sans,sans-serif',size:12,color:'#27304a'}}},
  yaxis:{
    range:[-0.2,4.2],
    tickvals:[0,1,2,3,4],
    ticktext:smTicktext,
    title:{text:'Weekday social media use',font:{family:'DM Sans,sans-serif',size:12,color:'#27304a'},standoff:8},
    gridcolor:'rgba(0,0,0,0.08)',
    linecolor:'rgba(0,0,0,0.15)',
    showline:true,
    tickfont:{family:'DM Sans,sans-serif',size:10,color:'#27304a'},
  },
  showlegend:false,
  paper_bgcolor:'rgba(0,0,0,0)',
  plot_bgcolor:'rgba(247,244,238,0.0)',
  margin:{t:40,b:70,l:95,r:20},
  font:{family:'DM Sans,sans-serif',color:'#27304a'},
};

const config={responsive:true,displayModeBar:false};

Plotly.newPlot('chartHap',[
  makeTrace(AGES,HAP_P1,'Born in 2000',COL_P1,true,'x','y'),
  makeTrace(AGES,HAP_P2,'Born in 2005',COL_P2,true,'x','y'),
], hapLayout, config);

Plotly.newPlot('chartSM',[
  makeTrace(AGES,SM_P1,'Born in 2000',COL_P1,false,'x','y'),
  makeTrace(AGES,SM_P2,'Born in 2005',COL_P2,false,'x','y'),
], smLayout, config);

function reportHeight(){
  window.parent.postMessage({iframeHeight:document.documentElement.scrollHeight},'*');
}
new ResizeObserver(reportHeight).observe(document.body);
reportHeight();
</script>
